services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.7
    container_name: netmoshen-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - web

  acme-companion:
    image: nginxproxy/acme-companion:2.6
    container_name: netmoshen-acme-companion
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL:?Set LETSENCRYPT_EMAIL in .env}
      NGINX_PROXY_CONTAINER: netmoshen-nginx-proxy
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${DOMAIN:?Set DOMAIN in .env}/api/v1/domains/analyze/
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VIRTUAL_HOST: ${DOMAIN:?Set DOMAIN in .env}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN:?Set DOMAIN in .env}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?Set LETSENCRYPT_EMAIL in .env}
    expose:
      - "80"

    networks:
      - web
      - app

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DOMAIN: 0.0.0.0
      PORT: 8000
      API_V1: /api/v1
      REDIS_URI: redis://redis:6379/0
      DATABASE_URI: ${DATABASE_URI:-}
      VIRUS_TOTAL_API_KEY: ${VIRUS_TOTAL_API_KEY:-}
      GOOGLE_SAFE_BROWSING_API_KEY: ${GOOGLE_SAFE_BROWSING_API_KEY:-}
      YANDEX_SAFE_BROWSING_KEY: ${YANDEX_SAFE_BROWSING_KEY:-}
    volumes:
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - app

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app

volumes:
  certs:
  vhost:
  html:
  acme:
  backend_media:
  redis_data:

networks:
  web:
  app:
